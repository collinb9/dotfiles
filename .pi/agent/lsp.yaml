servers:
  - name: typescript
    server: typescript-language-server
    args:
      - --stdio
    fileTypes:
      - .ts
      - .tsx
      - .js
      - .jsx

  - name: python
    server: ruff
    args:
      - server
    fileTypes:
      - .py

  - name: lua
    server: lua-language-server
    fileTypes:
      - .lua
